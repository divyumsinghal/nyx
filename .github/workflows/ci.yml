name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  checks:
    name: Rust quality, security, and tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Just
        uses: extractions/setup-just@v3

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Install cargo-nextest (best effort)
        continue-on-error: true
        run: cargo install cargo-nextest --locked

      - name: Run security scan gate bundle
        run: just security

      - name: Run cross-app unauthorized-access gate
        run: just gate-cross-app-unauthorized

      - name: Run CI parity gate bundle
        run: just ci
