name: Auth Integration Tests

# Runs the full Kratos auth flow against real infrastructure.
# OTPs are sent via real SMTP and read back from the Kratos admin
# courier API

on:
  pull_request:
    paths:
      - "Monad/Heka/**"
      - "Prithvi/config/kratos/**"
      - "Prithvi/compose/auth-test.yml"
      - "Prithvi/postgres/**"
      - "tests/tests/auth/**"
      - "tests/tests/auth_integration.rs"
      - ".github/workflows/auth-tests.yml"
  push:
    branches:
      - main
    paths:
      - "Monad/Heka/**"
      - "Prithvi/config/kratos/**"
      - "Prithvi/compose/auth-test.yml"
      - "Prithvi/postgres/**"
      - "tests/tests/auth/**"
      - "tests/tests/auth_integration.rs"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  KRATOS_PUBLIC_URL: "http://localhost:4433"
  KRATOS_ADMIN_URL:  "http://localhost:4434"

jobs:
  auth-integration:
    name: Auth flow integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Build test binary
        run: cargo test --test auth_integration --no-run

      - name: Start auth stack (Postgres + Kratos)
        run: |
          docker compose \
            -f Prithvi/compose/auth-test.yml \
            up -d --wait --wait-timeout 600
        env:
          SMTP_CONNECTION_URI:  ${{ secrets.CI_SMTP_CONNECTION_URI }}
          SMTP_FROM_ADDRESS:    ${{ secrets.CI_SMTP_FROM_ADDRESS }}
          # Other required env vars for the stack
          POSTGRES_PASSWORD:         ${{ secrets.CI_POSTGRES_PASSWORD }}
          NYX_APP_DB_PASSWORD:       ${{ secrets.CI_NYX_APP_DB_PASSWORD }}
          NYX_MIGRATION_DB_PASSWORD: ${{ secrets.CI_NYX_MIGRATION_DB_PASSWORD }}
          KRATOS_DB_PASSWORD:        ${{ secrets.CI_KRATOS_DB_PASSWORD }}
          JWT_SECRET:                ${{ secrets.CI_JWT_SECRET }}
          CORS_ALLOWED_ORIGINS:      "http://localhost:5173"

      - name: Show service status (debug)
        if: always()
        run: |
          docker compose -f Prithvi/compose/auth-test.yml ps
          echo "--- Kratos health ---"
          curl -sf http://localhost:4433/health/ready || echo "Kratos not ready"

      - name: Run auth integration tests
        run: |
          cargo test \
            --test auth_integration \
            -- \
            --test-threads=4 \
            --nocapture
        env:
          KRATOS_PUBLIC_URL: ${{ env.KRATOS_PUBLIC_URL }}
          KRATOS_ADMIN_URL:  ${{ env.KRATOS_ADMIN_URL }}
          # Fixed test inbox — OTPs for OTP-flow tests are sent here.
          # Serial tests ensure at most one OTP test runs at a time.
          E2E_TEST_EMAIL: ${{ secrets.CI_E2E_TEST_EMAIL }}
          RUST_LOG: "info"
          RUST_BACKTRACE: "1"

      - name: Collect Kratos logs on failure
        if: failure()
        run: |
          echo "=== Kratos logs ==="
          docker logs auth-test-kratos 2>&1 | tail -100
          echo "=== Kratos migrate logs ==="
          docker logs auth-test-kratos-migrate 2>&1 || true
          echo "=== Postgres logs ==="
          docker logs auth-test-postgres 2>&1 | tail -50

      - name: Tear down auth stack
        if: always()
        run: |
          docker compose -f Prithvi/compose/auth-test.yml down -v --remove-orphans
