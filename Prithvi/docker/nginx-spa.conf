# =============================================================================
# nginx-spa.conf — SPA routing config for SvelteKit apps
# All unmatched paths fall through to index.html (client-side routing).
# CHANGE FOR PRODUCTION:
#   - Add gzip/brotli compression (or handle at Cloudflare edge)
#   - Tune cache-control headers for your asset versioning strategy
#   - Add CSP, HSTS, X-Frame-Options headers
# =============================================================================

server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"       always;
    add_header X-Content-Type-Options    "nosniff"          always;
    add_header X-XSS-Protection          "1; mode=block"    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    # PRODUCTION: replace the permissive CSP below with a strict policy.
    # add_header Content-Security-Policy "default-src 'self'; ..." always;

    # ── Static assets: long cache, immutable ─────────────────────────────────
    # SvelteKit hashes asset filenames, so these are safe to cache forever.
    location /_app/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # ── Favicon + robots ─────────────────────────────────────────────────────
    location ~* \.(ico|txt|xml)$ {
        expires    7d;
        add_header Cache-Control "public";
        try_files  $uri =404;
    }

    # ── SPA fallthrough ───────────────────────────────────────────────────────
    # For any path that doesn't match a static file, serve index.html.
    # SvelteKit client-side router takes over from there.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Health endpoint (for Dockerfile HEALTHCHECK) ──────────────────────────
    location /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ── Disable nginx version in error pages ─────────────────────────────────
    server_tokens off;
}
