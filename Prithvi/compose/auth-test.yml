# =============================================================================
# auth-test.yml — Minimal auth stack for integration testing
#
# Brings up only what the auth flow needs:
#   postgres  →  stores Kratos identity data
#   mailpit   →  captures outgoing emails (OTP codes, recovery links)
#   kratos    →  Ory Kratos identity & auth (after DB migration)
#   heimdall  →  API gateway used by xtask/client flow
#   caddy     →  HTTPS edge in front of Heimdall
#
# Usage:
#   docker compose -f Prithvi/compose/auth-test.yml --profile edge up -d --wait
#   KRATOS_PUBLIC_URL=http://localhost:4433 \
#   MAILPIT_API_URL=http://localhost:8025 \
#   cargo test -p tests --test auth_integration
#   docker compose -f Prithvi/compose/auth-test.yml down -v
# =============================================================================

name: nyx-auth-test

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17.4-alpine
    container_name: auth-test-postgres
    environment:
      POSTGRES_DB:       nyx
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.utf8"
      # Passwords for application roles (created by 02_roles.sh)
      NYX_APP_DB_PASSWORD:       ${NYX_APP_DB_PASSWORD:?Set NYX_APP_DB_PASSWORD in .env}
      NYX_MIGRATION_DB_PASSWORD: ${NYX_MIGRATION_DB_PASSWORD:?Set NYX_MIGRATION_DB_PASSWORD in .env}
      KRATOS_DB_PASSWORD:        ${KRATOS_DB_PASSWORD:?Set KRATOS_DB_PASSWORD in .env}
    volumes:
      - ../postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nyx && pg_isready -U postgres -d kratos"]
      interval: 3s
      timeout:  5s
      retries:  15
      start_period: 10s

  # ── Mailpit — local SMTP capture ────────────────────────────────────────────
  # All emails from Kratos land here instead of being delivered.
  # Web UI:  http://localhost:8025
  # API:     http://localhost:8025/api/v1/messages
  # SMTP:    localhost:1025
  mailpit:
    image: axllent/mailpit:latest
    container_name: auth-test-mailpit
    environment:
      # Disable auth (test env only)
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
      # Kratos/gomail requires MandatoryStartTLS — Mailpit must advertise STARTTLS.
      # These are test-only self-signed certs (Prithvi/config/certs/).
      MP_SMTP_TLS_CERT: /etc/mailpit-tls/mailpit-test.crt
      MP_SMTP_TLS_KEY:  /etc/mailpit-tls/mailpit-test.key
    volumes:
      - ../config/certs:/etc/mailpit-tls:ro
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI + REST API
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8025/api/v1/messages > /dev/null"]
      interval: 3s
      timeout:  3s
      retries:  10
      start_period: 5s

  # ── Kratos migrate (runs once then exits) ───────────────────────────────────
  kratos-migrate:
    image: oryd/kratos:v1.3.1
    container_name: auth-test-kratos-migrate
    command: migrate sql -e --yes
    environment:
      DSN: "postgres://kratos_app:${KRATOS_DB_PASSWORD:?Set KRATOS_DB_PASSWORD in .env}@postgres:5432/kratos?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Kratos ─────────────────────────────────────────────────────────────────
  kratos:
    image: oryd/kratos:v1.3.1
    container_name: auth-test-kratos
    # --dev disables HTTPS enforcement and relaxes CORS — test only
    command: serve --config=/etc/config/kratos/kratos.test.yml --dev --watch-courier
    volumes:
      - ../config/kratos:/etc/config/kratos:ro
    environment:
      KRATOS_PUBLIC_URL: ${KRATOS_PUBLIC_URL:-https://localhost:3443/api/nyx/auth}
      NX_WEB_URL: ${NX_WEB_URL:-http://localhost:5173}
      MAILPIT_UI_URL: ${MAILPIT_UI_URL:-http://localhost:8025}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-localhost}
      KRATOS_DB_PASSWORD: ${KRATOS_DB_PASSWORD:?Set KRATOS_DB_PASSWORD in .env}
    ports:
      - "4433:4433"   # public API
      - "4434:4434"   # admin API for host-side auth tests
    depends_on:
      kratos-migrate:
        condition: service_completed_successfully
      mailpit:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4433/health/ready | grep -q status"]
      interval: 5s
      timeout:  5s
      retries:  20
      start_period: 15s

  heimdall:
    image: rust:1.85
    container_name: auth-test-heimdall
    working_dir: /workspace
    command: ["/bin/sh", "-c", "cargo run -p heimdall"]
    volumes:
      - ../..:/workspace
    environment:
      HEIMDALL_HOST: "0.0.0.0"
      HEIMDALL_PORT: "3000"
      NYX_ENVIRONMENT: development
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_EXPIRY_SECS: "3600"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?Set CORS_ALLOWED_ORIGINS in .env}
      DATABASE_URL: "postgres://nyx_app:${NYX_APP_DB_PASSWORD:?Set NYX_APP_DB_PASSWORD in .env}@postgres:5432/nyx?sslmode=disable"
      KRATOS_PUBLIC_URL: "http://kratos:4433"
      MATRIX_URL: ${MATRIX_URL:-http://kratos:4433}
      UZUME_PROFILES_URL: ${UZUME_PROFILES_URL:-http://kratos:4433}
      UZUME_FEED_URL: ${UZUME_FEED_URL:-http://kratos:4433}
      UZUME_STORIES_URL: ${UZUME_STORIES_URL:-http://kratos:4433}
      UZUME_REELS_URL: ${UZUME_REELS_URL:-http://kratos:4433}
      UZUME_DISCOVER_URL: ${UZUME_DISCOVER_URL:-http://kratos:4433}
    depends_on:
      postgres:
        condition: service_healthy
      kratos:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz | grep -q status"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 240s

  caddy:
    image: caddy:latest
    container_name: auth-test-caddy
    profiles: ["edge"]
    depends_on:
      heimdall:
        condition: service_healthy
    environment:
      EDGE_HOST: ${EDGE_HOST:-localhost}
      EDGE_HTTPS_PORT: ${EDGE_HTTPS_PORT:-3443}
      HEIMDALL_UPSTREAM: ${HEIMDALL_UPSTREAM:-heimdall:3000}
    volumes:
      - ../config/caddy/Caddyfile.auth-test:/etc/caddy/Caddyfile:ro
      - auth-test-caddy-data:/data
      - auth-test-caddy-config:/config
    ports:
      - "${EDGE_HTTP_BIND_PORT:-3080}:80"
      - "${EDGE_HTTPS_BIND_PORT:-3443}:443"

volumes:
  auth-test-caddy-data:
  auth-test-caddy-config:
