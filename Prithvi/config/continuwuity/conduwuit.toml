# =============================================================================
# conduwuit.toml — Continuwuity (Matrix homeserver) configuration
# Project: https://conduwuit.puppyirl.gay
# =============================================================================
# CHANGE FOR PRODUCTION:
#   - server_name: must match your public domain (nyx.com)
#   - well_known_client / well_known_server: set to HTTPS URLs
#   - Increase worker_threads for prod hardware
#   - Set up a Cloudflare Tunnel or reverse-proxy in front of port 8008
#   - allowed_room_creation_groups: restrict to trusted server accounts
# =============================================================================

[global]
# ── Identity ──────────────────────────────────────────────────────────────────
# This is the Matrix homeserver domain. User IDs look like @alice:nyx.com.
# CANNOT be changed after first start — it's baked into all Matrix IDs.
#
# DEV:  use "localhost" (or whatever resolves in your container network)
# PROD: use "nyx.com"
server_name = "${MATRIX_SERVER_NAME:-nyx.com}"

# ── Storage ───────────────────────────────────────────────────────────────────
database_backend = "rocksdb"
database_path     = "/data/conduwuit"

# ── Networking ────────────────────────────────────────────────────────────────
# TLS is terminated by Heimdall / nginx. Conduwuit binds plain HTTP.
port    = [8008]
address = ["0.0.0.0"]

# Max upload size: 20 MiB (media goes to MinIO via Oya, not conduwuit storage)
max_request_size = 20971520

# ── Registration ──────────────────────────────────────────────────────────────
# Registration is DISABLED — Nyx creates Matrix accounts via the admin API
# after Kratos identity creation. Users never register directly on Matrix.
allow_registration = false
registration_token_file = ""

# ── Federation ────────────────────────────────────────────────────────────────
# Federation is disabled for privacy-first launch. Users on nyx.com cannot
# message users on external Matrix servers (and vice versa) unless explicitly
# opted-in in a future release.
# To enable: set to true and add trusted_servers
allow_federation           = false
federation_enabled         = false
allow_public_room_directory = false

# ── Room creation ─────────────────────────────────────────────────────────────
# App services (Ogma library) create DM rooms on behalf of users.
allow_room_creation = true

# ── Well-known ────────────────────────────────────────────────────────────────
# These advertise where Matrix clients should connect.
# In dev they're not strictly needed (no external clients).
# In prod, serve /.well-known/matrix/client and /.well-known/matrix/server
# from your reverse proxy pointing here.
#
# DEV:  comment these out or set to localhost equivalents
# PROD: uncomment and set to your real HTTPS URLs
# well_known_client = "https://matrix.nyx.com"
# well_known_server = "matrix.nyx.com:443"

# ── App service ───────────────────────────────────────────────────────────────
# Ogma registers as an application service to bridge Nyx identities → Matrix.
# The registration YAML is generated by Ogma at startup and mounted here.
# See Monad/Ogma/README.md for details.
# appservice_registration_files = ["/etc/conduwuit/nyx-ogma-registration.yml"]

# ── Performance ───────────────────────────────────────────────────────────────
worker_threads = 4   # increase to (num_cpus - 1) in prod

# ── Logging ───────────────────────────────────────────────────────────────────
# Format: tracing filter directives
# "warn" for prod, "warn,conduwuit=info" for debugging
log = "${CONDUWUIT_LOG:-warn}"
