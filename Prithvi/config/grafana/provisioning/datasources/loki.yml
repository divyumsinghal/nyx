apiVersion: 1

datasources:
  - name:    Loki
    type:    loki
    uid:     loki
    url:     http://loki:3100
    access:  proxy
    jsonData:
      # Link Loki log lines to Prometheus traces via TraceID field
      derivedFields:
        - datasourceUid:  prometheus
          matcherRegex:   '"trace_id":"([^"]+)"'
          name:           TraceID
          url:            "$${__value.raw}"
          urlDisplayLabel: "Open in Tempo"
      # Maximum lines to return per query (protect Grafana memory)
      maxLines: 1000
    editable: false
