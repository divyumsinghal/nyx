# =============================================================================
# nats-server.conf — Nyx NATS JetStream configuration
# =============================================================================
# CHANGE FOR PRODUCTION:
#   - Set NYX_NATS_PASSWORD via environment / secrets manager
#   - Enable TLS: uncomment the tls block and provide certs
#   - Tune max_payload, max_pending, and store limits for your hardware
# =============================================================================

# ── Networking ────────────────────────────────────────────────────────────────
listen: "0.0.0.0:4222"

# HTTP monitoring endpoint (Prometheus scrapes /varz, /connz, /healthz)
# NOT exposed publicly — keep behind an internal network.
http_port: 8222

# ── Authentication ────────────────────────────────────────────────────────────
# Single-user credential for all Nyx services.
# To change: set NYX_NATS_USER / NYX_NATS_PASSWORD in your .env
# In production: consider using NKey credentials or operator-mode auth.
authorization {
  user:     $NYX_NATS_USER
  password: $NYX_NATS_PASSWORD
  timeout:  5
}

# ── JetStream ─────────────────────────────────────────────────────────────────
# JetStream provides at-least-once delivery, replay, and consumer groups.
# Streams themselves are created at application startup via nyx-xtask.
#
# Stream topology (see NATS event map in CLAUDE.md):
#   NYX   — subjects: nyx.>   (system-wide events: user.created, user.deleted)
#   UZUME — subjects: Uzume.> (social-app events: post.created, story.viewed, …)
#
# Storage layout: one directory per stream under store_dir.
jetstream {
  store_dir:       "/data/jetstream"
  max_memory_store: 1073741824    # 1 GiB in-memory tier
  max_file_store:  10737418240    # 10 GiB disk tier
  # In production: set domain to distinguish clusters
  # domain: "nyx"
}

# ── Message limits ────────────────────────────────────────────────────────────
max_payload:       4194304   # 4 MiB max message size
max_pending:       67108864  # 64 MiB max pending bytes per client

# ── Logging ───────────────────────────────────────────────────────────────────
# JSON structured logs so Promtail / Loki can parse them.
logtime:       true
log_size_limit: 104857600  # rotate at 100 MiB

# ── Cluster / leaf nodes ──────────────────────────────────────────────────────
# Single-node in dev. For production HA, uncomment and configure a 3-node cluster.
# cluster {
#   name:    nyx
#   listen:  "0.0.0.0:6222"
#   routes:  ["nats-route://nats-2:6222", "nats-route://nats-3:6222"]
# }

# ── TLS (production) ──────────────────────────────────────────────────────────
# Terminate TLS at the load-balancer / Heimdall in prod.
# For direct TLS:
# tls {
#   cert_file:  "/certs/nats-server.crt"
#   key_file:   "/certs/nats-server.key"
#   ca_file:    "/certs/ca.crt"
#   verify:     true
# }
