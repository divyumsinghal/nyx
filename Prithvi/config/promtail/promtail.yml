# =============================================================================
# promtail.yml — Promtail log collector → Loki
# =============================================================================
# Promtail uses Docker service discovery to tail container stdout/stderr
# and ships log lines to Loki with container-level labels.
# =============================================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail-positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    backoff_config:
      min_period:  500ms
      max_period:  5m
      max_retries: 10
    timeout: 10s

scrape_configs:
  - job_name: docker-containers
    docker_sd_configs:
      - host:             unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          # Only collect logs from containers in the nyx project
          - name:   label
            values: ["com.docker.compose.project=nyx"]
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex:         "/(.*)"
        target_label:  "container"
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label:  "service"
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        target_label:  "project"
      - source_labels: ["__meta_docker_container_id"]
        target_label:  "container_id"

    pipeline_stages:
      # ── JSON log lines (tracing-subscriber json format) ───────────────────
      - json:
          expressions:
            level:      level
            message:    fields.message
            trace_id:   span.trace_id
            service:    target
            timestamp:  timestamp
      - labels:
          level:
          service:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      # ── Drop DEBUG logs in prod to save storage ────────────────────────────
      # Uncomment in production:
      # - drop:
      #     expression: '.*"level":"DEBUG".*'
