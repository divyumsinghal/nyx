# =============================================================================
# loki.yml — Grafana Loki log aggregation (single-node)
# =============================================================================
# CHANGE FOR PRODUCTION:
#   - Switch object_store from "filesystem" to "s3" (MinIO or Cloudflare R2)
#   - Enable auth_enabled + tenant isolation
#   - Tune retention_period per compliance requirements
#   - Set up ruler for log-based alerting
# =============================================================================

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level:        warn

# ── Ingester ──────────────────────────────────────────────────────────────────
ingester:
  lifecycler:
    address:    127.0.0.1
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    final_sleep: 0s
  chunk_idle_period:        5m
  max_chunk_age:            1h
  chunk_retain_period:      30s

# ── Schema ────────────────────────────────────────────────────────────────────
schema_config:
  configs:
    - from:          "2025-01-01"
      store:         tsdb
      object_store:  filesystem
      schema:        v13
      index:
        prefix: index_
        period: 24h

# ── Storage ───────────────────────────────────────────────────────────────────
storage_config:
  filesystem:
    directory: /loki/chunks
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location:         /loki/tsdb-cache

# ── Compactor ─────────────────────────────────────────────────────────────────
compactor:
  working_directory:    /loki/compactor
  retention_enabled:    true
  delete_request_store: filesystem
  compaction_interval:  10m

# ── Limits ────────────────────────────────────────────────────────────────────
limits_config:
  # 31-day retention. Adjust per legal / compliance requirements.
  retention_period:             744h
  # Ingestion rate limits (generous for dev; tighten in prod)
  ingestion_rate_mb:            16
  ingestion_burst_size_mb:      32
  per_stream_rate_limit:        3MB
  per_stream_rate_limit_burst:  15MB
  # Query window
  max_query_lookback:           744h
  max_query_range:              744h
  max_entries_limit_per_query:  50000

# ── Query engine ──────────────────────────────────────────────────────────────
query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
  alertmanager_url: http://localhost:9093  # wire up if/when Alertmanager is added
