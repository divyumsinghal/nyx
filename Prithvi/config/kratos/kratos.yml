# =============================================================================
# kratos.yml — Ory Kratos identity & auth configuration
# Docs: https://www.ory.sh/docs/kratos/reference/configuration
# =============================================================================
#
# ── IDENTITY MODEL ────────────────────────────────────────────────────────────
# Registration:  email + nyx_id (handle) + password   OR   email OTP (code method)
# Login:         email OR nyx_id + password            OR   email magic code
# Verification:  email OTP
# Recovery:      email OTP
# Social login:  Google OAuth2 (requires GOOGLE_CLIENT_ID + GOOGLE_CLIENT_SECRET)
# 2FA:           TOTP (optional, user-controlled)
#
# Phone auth has been dropped completely. Email-only platform.
#
# ── REQUIRED ENVIRONMENT VARIABLES ───────────────────────────────────────────
# DSN is assembled from: KRATOS_DB_PASSWORD, POSTGRES_HOST
# KRATOS_COOKIE_SECRET   32+ byte secret
# KRATOS_CIPHER_SECRET   32+ byte secret
# KRATOS_PUBLIC_URL      e.g. http://localhost:4433 or https://auth.nyx.com
# NX_WEB_URL             e.g. http://localhost:5173 or https://nyx.com
# COOKIE_DOMAIN          e.g. localhost or nyx.com
# SMTP_CONNECTION_URI    Real SMTP — required, no default.
#                        Gmail:    smtps://you%40gmail.com:APP_PASSWORD@smtp.gmail.com:465/
#                        Resend:   smtps://resend:API_KEY@smtp.resend.com:465/
#                        SendGrid: smtps://apikey:API_KEY@smtp.sendgrid.net:465/
# SMTP_FROM_ADDRESS      e.g. noreply@nyx.com
# GOOGLE_CLIENT_ID       (leave blank to disable Google login)
# GOOGLE_CLIENT_SECRET   (leave blank to disable Google login)
#
# ── CHANGE FOR PRODUCTION ─────────────────────────────────────────────────────
# - Set secrets to 32-byte random values
# - Change KRATOS_PUBLIC_URL to https://auth.nyx.com
# - Configure SMTP_CONNECTION_URI with a real provider
# - Set GOOGLE_CLIENT_ID + GOOGLE_CLIENT_SECRET for Google login
# - Remove --dev flag from Kratos serve command
# =============================================================================

version: v1.3.1

# ── Database ──────────────────────────────────────────────────────────────────
dsn: "postgres://kratos_app:${KRATOS_DB_PASSWORD}@${POSTGRES_HOST}:5432/kratos?sslmode=disable&max_conns=20&max_idle_conns=4"

# ── Network ───────────────────────────────────────────────────────────────────
serve:
  public:
    base_url: "${KRATOS_PUBLIC_URL}"
    port: 4433
    cors:
      enabled: true
      allowed_origins:
        - "${NX_WEB_URL}"          # injected: http://localhost:8082 locally, real URL in prod
        - "${EDGE_URL}"            # injected: https://localhost:3443 locally, https://nyx.com in prod
        - "http://localhost:5173"  # Expo/Vite secondary dev port — not a secret, safe to be static
        - "http://localhost:5174"  # Expo/Vite secondary dev port — not a secret, safe to be static
        - "https://nyx.com"
        - "https://uzume.nyx.com"
        - "https://anteros.nyx.com"
        - "https://themis.nyx.com"
      allowed_methods:  [POST, GET, PUT, PATCH, DELETE]
      allowed_headers:  [Authorization, Content-Type, X-Session-Token, X-CSRF-Token]
      exposed_headers:  [Content-Type]
      allow_credentials: true

  admin:
    base_url: "http://kratos:4434"
    port: 4434

# ── Self-service flows ────────────────────────────────────────────────────────
selfservice:
  default_browser_return_url: "${NX_WEB_URL}"

  allowed_return_urls:
    - "${NX_WEB_URL}"
    - "${EDGE_URL}"
    - "http://localhost:5173"
    - "http://localhost:5174"
    - "https://nyx.com"
    - "https://uzume.nyx.com"
    - "https://anteros.nyx.com"
    - "https://themis.nyx.com"

  methods:
    # ── Password strategy ───────────────────────────────────────────────────
    password:
      enabled: true
      config:
        min_password_length: 10
        haveibeenpwned_enabled: true
        max_breaches: 0
        identifier_similarity_check_enabled: true

    # ── Code strategy (OTP via email) ────────────────────────────────────────
    # Used for: email verification, passwordless login (magic code), registration OTP.
    # Phone SMS has been removed — email-only.
    code:
      enabled:               true
      mfa_enabled:           false
      # true = users can log in by receiving a code to their email (no password needed)
      passwordless_enabled:  true

    # ── TOTP (optional 2FA) ──────────────────────────────────────────────────
    totp:
      enabled: true
      config:
        issuer: "Nyx"

    # ── WebAuthn / Passkeys ──────────────────────────────────────────────────
    webauthn:
      enabled: false
      config:
        rp:
          display_name: "Nyx"
          id:      "nyx.com"
          origins: ["https://nyx.com"]

    # ── Link strategy (legacy magic-link) ────────────────────────────────────
    link:
      enabled: true
      config:
        lifespan: "1h"

    # ── OIDC / Social login ───────────────────────────────────────────────────
    # Google OAuth2. Requires GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET.
    # If those env vars are empty, Google login will fail gracefully at the
    # consent screen — all other auth methods continue to work normally.
    # The jsonnet mapper only maps email (verified). nyx_id is NOT auto-filled
    # from Google — Kratos will prompt the user to choose one via the
    # registration continuation flow (returns 422 with nyx_id field).
    oidc:
      enabled: true
      config:
        providers:
          - id: google
            provider: google
            client_id:     "${GOOGLE_CLIENT_ID}"
            client_secret: "${GOOGLE_CLIENT_SECRET}"
            mapper_url:    "file:///etc/config/kratos/oidc.google.jsonnet"
            scope:
              - email
              - profile
            requested_claims:
              id_token:
                email:
                  essential: true
                email_verified:
                  essential: true

    # ── Lookup secrets (backup codes) ────────────────────────────────────────
    lookup_secret:
      enabled: true

  # ── Flow: Registration ──────────────────────────────────────────────────────
  flows:
    registration:
      lifespan: "1h"
      enabled: true
      ui_url: "${NX_WEB_URL}/auth/register"
      after:
        # For password signup: create session immediately.
        # Email verification is available separately — not blocking.
        password:
          hooks:
            - hook: session
        # For code (OTP) signup: the OTP itself verifies email, so just create session.
        code:
          hooks:
            - hook: session
        # For Google OIDC signup: create session immediately.
        oidc:
          hooks:
            - hook: session

    # ── Flow: Login ─────────────────────────────────────────────────────────
    login:
      lifespan: "1h"
      ui_url: "${NX_WEB_URL}/auth/login"
      after:
        password:
          hooks:
            - hook: revoke_active_sessions
        code:
          hooks:
            - hook: revoke_active_sessions
        oidc:
          hooks:
            - hook: revoke_active_sessions

    # ── Flow: Verification ──────────────────────────────────────────────────
    verification:
      enabled: true
      lifespan: "15m"
      use: code
      ui_url: "${NX_WEB_URL}/auth/verify"
      notify_unknown_recipients: false

    # ── Flow: Recovery ──────────────────────────────────────────────────────
    recovery:
      enabled: true
      lifespan: "15m"
      use: code
      ui_url: "${NX_WEB_URL}/auth/recover"
      notify_unknown_recipients: false

    # ── Flow: Settings ──────────────────────────────────────────────────────
    settings:
      lifespan: "1h"
      privileged_session_max_age: "15m"
      ui_url: "${NX_WEB_URL}/settings"
      after:
        password:
          hooks:
            - hook: revoke_active_sessions

    # ── Flow: Logout ────────────────────────────────────────────────────────
    logout:
      after:
        default_browser_return_url: "${NX_WEB_URL}/auth/login"

# ── Session ───────────────────────────────────────────────────────────────────
session:
  lifespan: "720h"
  earliest_possible_extend: "24h"
  cookie:
    name: "nyx_session"
    domain: "${COOKIE_DOMAIN}"
    same_site: Lax
    persistent: true

# ── Identity ──────────────────────────────────────────────────────────────────
identity:
  default_schema_id: nyx_identity
  schemas:
    - id: nyx_identity
      url: "file:///etc/config/kratos/identity.schema.json"

# ── Secrets ───────────────────────────────────────────────────────────────────
secrets:
  cookie:
    - "${KRATOS_COOKIE_SECRET}"
  cipher:
    - "${KRATOS_CIPHER_SECRET}"

# ── Hash (password storage) ───────────────────────────────────────────────────
hashers:
  algorithm: argon2
  argon2:
    memory:      "128MB"
    iterations:  3
    parallelism: 4
    salt_length: 16
    key_length:  32
    expected_duration: "500ms"

# ── Courier (email only — phone/SMS removed) ──────────────────────────────────
# SMTP_CONNECTION_URI is required — there is no fallback to a local fake inbox.
# Every environment (dev, CI, prod) must provide a real SMTP connection string.
# See REQUIRED ENVIRONMENT VARIABLES at the top of this file for format examples.
courier:
  smtp:
    connection_uri: "${SMTP_CONNECTION_URI}"
    from_address:   "${SMTP_FROM_ADDRESS}"
    from_name:      "Nyx"
    headers:
      "X-Mailer": "Ory Kratos"

# ── Logging ───────────────────────────────────────────────────────────────────
log:
  level:             warning
  format:            json
  leak_sensitive_values: false
