# =============================================================================
# kratos.test.yml — Ory Kratos config for the auth integration test stack
#
# All values are hardcoded for the local test environment.
# DO NOT use in production. Production uses kratos.yml with real secrets.
#
# Brought up by: docker compose -f Prithvi/compose/auth-test.yml up -d
# =============================================================================

version: v1.3.1

# ── Database ──────────────────────────────────────────────────────────────────
dsn: "postgres://kratos_app:kratos_test_pw@postgres:5432/kratos?sslmode=disable&max_conns=20&max_idle_conns=4"

# ── Network ───────────────────────────────────────────────────────────────────
serve:
  public:
    base_url: "http://localhost:4433"
    port: 4433
    cors:
      enabled: true
      allowed_origins:
        - "http://localhost:5173"
        - "http://localhost:8025"
      allowed_methods:  [POST, GET, PUT, PATCH, DELETE]
      allowed_headers:  [Authorization, Content-Type, X-Session-Token, X-CSRF-Token]
      exposed_headers:  [Content-Type]
      allow_credentials: true

  admin:
    base_url: "http://kratos:4434"
    port: 4434

# ── Self-service flows ────────────────────────────────────────────────────────
selfservice:
  default_browser_return_url: "http://localhost:5173"

  allowed_return_urls:
    - "http://localhost:5173"
    - "http://localhost:4433"

  methods:
    password:
      enabled: true
      config:
        min_password_length: 8
        haveibeenpwned_enabled: false
        max_breaches: 0
        identifier_similarity_check_enabled: true

    code:
      enabled: true
      mfa_enabled: false
      passwordless_enabled: true

    totp:
      enabled: false

    webauthn:
      enabled: false
      config:
        rp:
          display_name: "Nyx Test"
          id: "localhost"
          origins: ["http://localhost:5173"]

    link:
      enabled: true
      config:
        lifespan: "1h"

    oidc:
      enabled: false

    lookup_secret:
      enabled: true

  flows:
    registration:
      lifespan: "1h"
      enabled: true
      ui_url: "http://localhost:5173/auth/register"
      after:
        password:
          hooks:
            - hook: session
        code:
          hooks:
            - hook: session

    login:
      lifespan: "1h"
      ui_url: "http://localhost:5173/auth/login"
      after:
        password:
          hooks:
            - hook: revoke_active_sessions
        code:
          hooks:
            - hook: revoke_active_sessions

    verification:
      enabled: true
      lifespan: "15m"
      use: code
      ui_url: "http://localhost:5173/auth/verify"
      notify_unknown_recipients: false

    recovery:
      enabled: true
      lifespan: "15m"
      use: code
      ui_url: "http://localhost:5173/auth/recover"
      notify_unknown_recipients: false

    settings:
      lifespan: "1h"
      privileged_session_max_age: "15m"
      ui_url: "http://localhost:5173/settings"

    logout:
      after:
        default_browser_return_url: "http://localhost:5173/auth/login"

# ── Session ───────────────────────────────────────────────────────────────────
session:
  lifespan: "720h"
  earliest_possible_extend: "24h"
  cookie:
    name: "nyx_session"
    domain: "localhost"
    same_site: Lax
    persistent: true

# ── Identity ──────────────────────────────────────────────────────────────────
identity:
  default_schema_id: nyx_identity
  schemas:
    - id: nyx_identity
      url: "file:///etc/config/kratos/identity.schema.json"

# ── Secrets (test-only — never use in production) ─────────────────────────────
secrets:
  cookie:
    - "test-cookie-secret-exactly-32byt"
  cipher:
    - "test-cipher-secret-exactly-32byt"

# ── Hash (password storage) ───────────────────────────────────────────────────
hashers:
  algorithm: argon2
  argon2:
    memory:      "64MB"
    iterations:  1
    parallelism: 2
    salt_length: 16
    key_length:  32
    expected_duration: "500ms"

# ── Courier (Mailpit — local SMTP capture) ───────────────────────────────────
courier:
  smtp:
    connection_uri: "smtp://mailpit:1025/?skip_ssl_verify=true"
    from_address:   "noreply@nyx.test"
    from_name:      "Nyx Test"

# ── Logging ───────────────────────────────────────────────────────────────────
log:
  level:  info
  format: json
  leak_sensitive_values: false
