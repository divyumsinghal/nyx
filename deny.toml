# ==================================================================
# cargo-deny configuration for the nyx monorepo
# Run with: cargo deny check
# ==================================================================

[graph]
# Target platforms your services will run on
targets = [
    { triple = "x86_64-unknown-linux-gnu" },  # Linux x86_64 servers
    { triple = "aarch64-unknown-linux-gnu" }, # ARM64 servers
    { triple = "wasm32-unknown-unknown" },    # WebAssembly for website
]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ==================================================================
# Security Advisories
# ==================================================================
[advisories]
ignore = [
    # async-nats currently pulls rustls-pemfile; crate is archived with no replacement release in that chain yet.
    { id = "RUSTSEC-2025-0134", reason = "Transitive via async-nats/testcontainers stack; no safe upgrade path currently available" },
    # testcontainers currently depends on archived tokio-tar; no safe upgrade in current upstream release line.
    { id = "RUSTSEC-2025-0111", reason = "Transitive via testcontainers; awaiting upstream migration off tokio-tar" },
    # Pinned by async-nats dependency chain in current workspace graph.
    { id = "RUSTSEC-2026-0049", reason = "Transitive rustls-webpki in async-nats graph; awaiting compatible upstream release" },
    # Pinned through async-nats/aws-creds path in current dependency graph.
    { id = "RUSTSEC-2026-0009", reason = "Transitive time crate in async-nats/aws-creds graph; awaiting compatible upstream release" },
]

# ==================================================================
# License Compliance
# ==================================================================
[licenses]
# Allowed licenses for dependencies
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",                    # For unicode-ident and similar
    "MPL-2.0",                        # Some crates use Mozilla Public License
    "Zlib",                           # For compression crates
    "CC0-1.0",                        # Transitive via tiny-keccak in current AWS creds chain
    "CDLA-Permissive-2.0",            # Transitive via webpki-roots in reqwest/sqlx chains
    "NCSA",                           # Required by libfuzzer-sys in tests/fuzz tooling
    "AGPL-3.0-or-later",              # Workspace crates are AGPL-licensed
]
confidence-threshold = 0.8

[licenses.private]
ignore = true # Ignore workspace crates (they're yours, not third-party)

# ==================================================================
# Bans and Duplicate Detection
# ==================================================================
[bans]
# Allow duplicate versions for now due unavoidable transitive splits across major ecosystems.
multiple-versions = "allow"

# Allow wildcard path dependencies used across internal workspace crates.
wildcards = "allow"

highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# Ban specific problematic crates
deny = [
    # Example: { crate = "chrono", reason = "Use time crate instead (chrono has security advisories)" }
]

# Skip duplicates that you can't easily fix (temporary)
skip = [
    # { crate = "old-crate@0.1.0", reason = "Waiting for upstream update" }
]

# ==================================================================
# Source Restrictions
# ==================================================================
[sources]
# Only allow crates from crates.io
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
